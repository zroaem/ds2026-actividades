<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- EN ORDEN: navbar, horizontal a hamburguesa, texto claro sobre fondo oscuro-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <!-- Título y logo: lleva a index desde cualquier página -->
            <a class="navbar-brand" href="index.html">
                📚 Librería
            </a>

            <!-- Botón hamburguesa: solo aparece en pantallas chicas. data-bs-target tiene que coincidir con el id de abajo -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menú colapsable, el id tiene que coincidir con data-bs-target -->
            <div class="collapse navbar-collapse" id="menuNavbar">
                <ul class="navbar-nav ms-auto">

                    <!-- active marca la página actual. En cada HTML solo un link tiene active -->
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="catalogo.html">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contacto.html">Contacto</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <div class="container py-5">
        <h1 class="mb-4">Catálogo</h1>

        <div class="d-flex gap-2 mb-4">
            <input type="text" id="inputBusqueda"
                   class="form-control" placeholder="Buscar libros...">
            <button id="btnBuscar" class="btn btn-primary">Buscar</button>
        </div>

        <p id="cargando" style="display: none;">Cargando...</p>
        <p id="error" class="text-danger" style="display: none;"></p>

        <div id="resultados"
             class="row g-4 row-cols-2 row-cols-md-3 row-cols-lg-4">
        </div>
    </div>

    <script src="js/data.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
