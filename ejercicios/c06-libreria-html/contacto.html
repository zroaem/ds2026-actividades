<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- EN ORDEN: navbar, horizontal a hamburguesa, texto claro sobre fondo oscuro-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <!-- Título y logo: lleva a index desde cualquier página -->
            <a class="navbar-brand" href="index.html">
                📚 Librería
            </a>

            <!-- Botón hamburguesa: solo aparece en pantallas chicas. data-bs-target tiene que coincidir con el id de abajo -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menú colapsable, el id tiene que coincidir con data-bs-target -->
            <div class="collapse navbar-collapse" id="menuNavbar">
                <ul class="navbar-nav ms-auto">

                    <!-- active marca la página actual. En cada HTML solo un link tiene active -->
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalogo.html">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link  active" href="contacto.html">Contacto</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <div class="container py-5">
        <h1 class="mb-4">Contacto</h1>

        <form>
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="asunto" class="form-label">Asunto</label>
                <select id="asunto" class="form-select" required>
                    <option value="">Seleccioná una opción</option>
                    <option value="consulta">Consulta</option>
                    <option value="reclamo">Reclamo</option>
                    <option value="sugerencia">Sugerencia</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="mensaje" class="form-label">Mensaje</label>
                <textarea id="mensaje" class="form-control" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
