<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- btn: clase base de Bootstrap que aplica estilos de botón. btn-primary: agrega el color azul -->
    <button class="btn btn-primary">¡Hola Bootstrap!</button>

    <!-- Bootstrap JS va al final del body, no en el head. El HTML tiene que estar completamente en el DOM antes de que JavaScript intente manipularlo.
    bundle.min.js incluye Bootstrap + Popper (tooltips, dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
